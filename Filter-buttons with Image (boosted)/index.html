<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Filter Buttons with Image | michaelmyeko_46</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section>
      <p class="section-title">Choose by your favorite <span>category</span></p>
      <ul class="filter-container">
        <li class="active" data-filter="all">All</li>
        <li data-filter="shoes">Shoes</li>
        <li data-filter="trouser">Trousers</li>
        <li data-filter="shirt">Shirts</li>
      </ul>
      <div class="images-list">
        <div class="image" data-category="shirt">
          <button>new</button>
          <img src="assets/shirt-1.jpeg" alt="category-clothes" />
        </div>
        <div class="image" data-category="shoes">
          <button>new</button>
          <img src="assets/shoes-1.jpeg" alt="category-clothes" />
        </div>
        <div class="image" data-category="shirt">
          <button>new</button>
          <img src="assets/shirt-2.jpeg" alt="category-clothes" />
        </div>
        <div class="image" data-category="shirt">
          <button>new</button>
          <img src="assets/shirt-3.jpeg" alt="category-clothes" />
        </div>
        <div class="image" data-category="trouser">
          <button>new</button>
          <img src="assets/trouser-1.jpeg" alt="category-clothes" />
        </div>
        <div class="image" data-category="shoes">
          <button>new</button>
          <img src="assets/shoes-2.jpeg" alt="category-clothes" />
        </div>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
